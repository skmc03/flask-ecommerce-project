<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add Review | BUYROUTE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
  body{
    min-height:100vh;
    margin:0;
    font-family:"Poppins",system-ui;
    background-image:url("https://img.freepik.com/free-photo/futuristic-metaverse-empty-room-product-display-presentation-abstract-technology-scifi-with-neon-light-3d-background_56104-2314.jpg");
    background-size:cover;
    background-repeat:no-repeat;
    background-attachment:fixed;
    padding:28px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }

  .logo{width:56px;height:56px;}

  .page-card{
    max-width:700px;
    margin:auto;
    background:rgba(255,255,255,0.94);
    border-radius:12px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }

  .btn-submit{
    background:linear-gradient(90deg,#ffd54a,#ffb74d);
    border:none;
    padding:10px 20px;
    font-weight:600;
    border-radius:6px;
  }
</style>
</head>

<body>

<div class="topbar">
  <a href="{{ url_for('home') }}"><img src="/static/BUYROUTE.png" class="logo"></a>
  <h3 style="color:white;font-weight:700;">Add Review</h3>
  <div></div>
</div>

<div class="page-card">

  <h4 style="font-weight:700;">Write your review</h4>

  <form  method="post">

      <div class="mb-3 mt-3">
        <label class="form-label"><strong>Your Rating (1–5)</strong></label>
        <select name="rating" class="form-control" required>
          <option value="">Select Rating</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label"><strong>Your Review</strong></label>
        <textarea name="review_text" class="form-control" rows="5" required></textarea>
      </div>

      <button type="submit" class="btn-submit">Submit Review</button>
      <a href="{{ url_for('descitem', itemid=itemid) }}" class="btn btn-secondary ms-2">Back</a>

  </form>

</div>

</body>
</html>
