<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUYROUTE | Welcome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Merienda:wght@700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Jersey+10&display=swap');

    /* Reset and base styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://cdn.wallpapersafari.com/51/58/2pVMUs.jpg') no-repeat center center/cover;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* Frosted Glass Box */
    .box {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border-radius: 15px;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      width: 90%;
      max-width: 420px;
      padding: 40px;
      animation: fadeIn 1s ease-in;
    }

    /* Logo */
    .box img {
      width: 100px;
      height: 100px;
      margin-bottom: 15px;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    /* Title */
    h1 {
      font-family: 'Merienda', cursive;
      font-size: 52px;
      background: linear-gradient(45deg, #ff4b1f, #ff9068);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    /* Subtitle */
    h3 {
      font-family: 'Jersey 10', sans-serif;
      font-size: 30px;
      color: #fff;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
      margin-bottom: 30px;
    }

    /* Button Styling */
    .btn-shop {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 40px;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0, 123, 255, 0.4);
      transition: all 0.3s ease-in-out;
    }

    .btn-shop:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(0, 123, 255, 0.6);
    }

    footer {
      position: absolute;
      bottom: 15px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      text-align: center;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      h1 { font-size: 38px; }
      h3 { font-size: 22px; }
      .btn-shop { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="box">
    <img src="#" alt="Logo">
    <h1>BUYROUTE</h1>
    <h3>Welcome’s To You</h3>
    <a href="{{url_for('home')}}">
      <button class="btn btn-shop">Shop Now</button>
    </a>
  </div>

  <footer>
    © 2025 BUYROUTE. All Rights Reserved.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
