<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up | BUYROUTE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root{
      --accent: #00ffff;
      --muted: #ffd600;
    }

    * { box-sizing: border-box; }

    html,body{height:100%; margin:0;}

    body{
      background: url('https://img.freepik.com/free-photo/arrangement-black-friday-shopping-carts-with-copy-space_23-2148667047.jpg')
        center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      padding: 18px;
      color: #fff;
    }

    /* container */
    .mainbox{
      width: 100%;
      max-width: 980px;        /* limit width to prevent overflow */
      min-height: 420px;
      border-radius: 14px;
      display: flex;
      gap: 0;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(0,0,0,0.40), rgba(0,0,0,0.22));
      transition: transform .2s ease;
    }
    .mainbox:hover{ transform: translateY(-4px); }

    /* left column (logo/art) */
    .side1{
      flex: 0 0 36%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      min-width: 220px;       /* helps mobile stack gracefully */
    }
    .imgbox img{
      width: 100%;
      max-width: 260px;
      height: auto;
      display:block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.6));
    }

    /* right column (form) */
    .side2{
      flex: 1 1 64%;
      padding: 22px 28px;
      color: #fff;
      min-width: 260px;
    }

    h2.form-title{ margin:0 0 12px 0; font-weight:700; color: #fff; }

    form { width:100%; }
    .form-row { display:block; margin-bottom:12px; }

    label { display:block; font-weight:600; margin-bottom:6px; color: rgba(255,255,255,0.92); }

    .form-control{
      width:100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255,255,255,0.14);
      border-radius: 0;
      color: #fff;
      padding: 10px 8px;
      transition: border-color .12s;
    }

    .form-control::placeholder{ color: rgba(255,242,0,0.9); }

    .form-control:focus{
      outline:none;
      box-shadow:none;
      border-bottom-color: var(--muted);
      background: rgba(255,255,255,0.02);
    }

    .radio { display:flex; gap:18px; margin-top:6px; }

    .btn-submit{
      display:block;
      width:100%;
      background: linear-gradient(90deg,#ffffff,#ffe082);
      color:#111;
      border:none;
      padding:10px 12px;
      border-radius:8px;
      font-weight:700;
      margin-top:10px;
    }

    .signup { margin-top:10px; font-size:.95rem; color: rgba(255,255,255,0.9); }
    .signup a{ color: var(--accent); text-decoration:none; font-weight:600; }
    .signup a:hover{ color:#00bcd4; text-decoration:underline; }

    /* small devices: stack and shrink paddings */
    @media (max-width: 880px){
      body { padding: 12px; }
      .mainbox{ flex-direction: column; max-width: 560px; min-height: auto; }
      .side1{ display:none; } /* hide left art for small screens */
      .side2{ padding: 18px; }
    }

    /* very small phones: reduce font and paddings more */
    @media (max-width:420px){
      .side2{ padding: 14px; }
      .form-control{ padding: 8px; font-size: 0.95rem; }
      .imgbox img { max-width: 220px; }
    }
  </style>
</head>
<body>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;">
        {% for m in messages %}<div class="alert alert-warning mb-1" role="alert">{{ m }}</div>{% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="mainbox" role="region" aria-label="Signup">
    <div class="side1" aria-hidden="true">
      <div class="imgbox">
        <img src="/static/BUYROUTE.png" alt="BUYROUTE logo">
      </div>
    </div>

    <div class="side2">
      <h2 class="form-title">Create your BUYROUTE account</h2>

      <form method="post" action="{{ url_for('usercreate') }}" novalidate>
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="form-row">
          <label for="address">Address</label>
          <input id="address" name="address" type="text" class="form-control" placeholder="Enter your address" required>
        </div>
        <div class="form-row">
          <label for="address">Phone_no</label>
          <input id="address" name="phone_no" type="text" class="form-control" placeholder="Enter your phone_no" required>
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" placeholder="Create password" required>
        </div>

        <div class="form-row">
          <label>Gender</label>
          <div class="radio" role="radiogroup" aria-label="Gender">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="usergender" id="genderMale" value="male" required>
              <label class="form-check-label" for="genderMale">Male</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="usergender" id="genderFemale" value="female">
              <label class="form-check-label" for="genderFemale">Female</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="usergender" id="genderOther" value="others">
              <label class="form-check-label" for="genderOther">Other</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit">Submit</button>

        <p class="signup">Already have an account? <a href="#">Login</a></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
