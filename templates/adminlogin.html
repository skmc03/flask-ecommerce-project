<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | BUYROUTE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous"
  />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap');

    body {
      background: url('https://img.freepik.com/premium-vector/geometric-gradient-technology-background_23-2149110132.jpg?semt=ais_hybrid')
        no-repeat center center / cover;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Merienda", cursive;
    }

    .form-container {
      width: 400px;
      padding: 30px;
      border-radius: 15px;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    h2 {
      margin-bottom: 20px;
      color: bisque;
      font-weight: bold;
    }

    label {
      font-weight: 600;
      text-align: left;
      display: block;
    }

    .btn-primary {
      width: 100%;
      background-color: brown;
      border: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background-color: rgb(206, 54, 54);
      transform: scale(1.03);
    }

    a {
      color: bisque;
      display: block;
      margin-top: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      color: white;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-warning text-center position-absolute top-0 start-50 translate-middle-x mt-3 w-50">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form class="form-container" method="post" action="{{ url_for('adminlogin') }}">
    <h2>Admin Login</h2>
    <div class="mb-3 text-start">
      <label for="exampleInputEmail1" class="form-label">Email:</label>
      <input
        type="email"
        class="form-control"
        id="exampleInputEmail1"
        aria-describedby="emailHelp"
        name="email"
        required
      />
    </div>
    <div class="mb-3 text-start">
      <label for="exampleInputPassword1" class="form-label">Password:</label>
      <input
        type="password"
        class="form-control"
        id="exampleInputPassword1"
        name="password"
        required
      />
    </div>

    <button type="submit" class="btn btn-primary">Login</button>
    <a href="#">Forgot password?</a>
    <a href="{{ url_for('admincreate') }}">Create Admin Account</a>
  </form>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"
  ></script>
</body>
</html>
