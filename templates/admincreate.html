<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Registration | BUYROUTE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Jersey+10&display=swap');

    body {
      background: url(https://cdn.wallpapersafari.com/51/58/2pVMUs.jpg) no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: "Merienda", cursive;
    }

    .container-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .form-box {
      width: 420px;
      padding: 30px;
      border-radius: 15px;
      color: white;
      backdrop-filter: blur(8px);
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    h2 {
      text-align: center;
      color: bisque;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
    }

    .btn-primary {
      width: 100%;
      font-weight: bold;
      background-color: brown;
      border: none;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background-color: rgb(219, 63, 63);
      transform: scale(1.03);
    }

    .alert {
      width: 420px;
      text-align: center;
      margin: 0;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: bisque;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-link:hover {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container-box">
    <!-- Flash Messages (Centered) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" role="alert">
            <h3 style="color:red">{{ message }}</h3>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Registration Form -->
    <form class="form-box" method="post" action="{{ url_for('admincreate') }}">
      <h2>Admin Registration</h2>

      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="username" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <input type="text" class="form-control" id="address" name="address" required>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="agree" name="agree" required>
        <label class="form-check-label" for="agree">I agree to the terms</label>
      </div>

      <button type="submit" class="btn btn-primary">Create Account</button>
      <a href="{{ url_for('index') }}" class="back-link">← Back to Shop</a>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
