<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | BUYROUTE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root{
      --accent: #00ffff;
      --muted: #ffd600;
      --google-red: #DB4437;
    }
    * { box-sizing: border-box; }
    html,body{height:100%; margin:0;}

    body{
      background: url('https://img.freepik.com/free-photo/arrangement-black-friday-shopping-carts-with-copy-space_23-2148667047.jpg')
        center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      padding: 20px;
      color:#fff;
    }

    .card-wrap{
      width:100%;
      max-width:920px;
      display:flex;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 18px 50px rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(0,0,0,0.36), rgba(0,0,0,0.22));
    }

    .panel-left{
      flex:0 0 36%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      min-width:220px;
      background: linear-gradient(135deg, rgba(34,193,195,0.05), rgba(253,187,45,0.03));
    }
    .panel-left img{ width:100%; max-width:260px; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.5)); }

    .panel-right{
      flex:1 1 64%;
      padding:28px 34px;
      min-width:260px;
    }

    h2{ margin:0 0 8px 0; font-weight:700; color:#fff; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }

    .flash-inline { margin-bottom: 12px; }

    form { width:100%; }
    .form-group { margin-bottom:12px; position:relative; }
    label { color: rgba(255,255,255,0.9); font-weight:600; display:block; margin-bottom:6px; }

    .form-control{
      width:100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255,255,255,0.14);
      border-radius: 0;
      color: #fff;
      padding: 10px 8px;
    }
    .form-control::placeholder{ color: rgba(255,242,0,0.9); }
    .form-control:focus{ outline:none; box-shadow:none; border-bottom-color: var(--muted); background: rgba(255,255,255,0.02); }

    .btn-primary-custom{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      background: linear-gradient(90deg,#ffffff,#ffe082);
      color:#111;
      font-weight:700;
      border:none;
      box-shadow:0 8px 20px rgba(0,0,0,0.35);
      margin-top:6px;
    }

    .meta-row { display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:12px; }
    .meta-row a { color: var(--accent); font-weight:600; text-decoration:none; }
    .meta-row a:hover { text-decoration:underline; color:#00bcd4; }

    .show-pass { position: absolute; right: 12px; top: 36px; color: rgba(255,255,255,0.8); cursor: pointer; user-select: none; font-size:0.9rem; }

    .remember { display:flex; align-items:center; gap:8px; margin-top:6px; color: rgba(255,255,255,0.9); }

    .or-sep { display:flex; align-items:center; gap:10px; margin:18px 0; color: rgba(255,255,255,0.7); }
    .or-sep::before, .or-sep::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.06); }

    .btn-google {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      background: #fff;
      color: #111;
      font-weight:700;
      box-shadow:0 6px 18px rgba(0,0,0,0.25);
    }
    .btn-google .dot { width:18px; height:18px; border-radius:50%; background: var(--google-red); display:inline-block; }

    @media (max-width: 880px){
      .card-wrap{ flex-direction:column; max-width:560px; }
      .panel-left{ display:none; }
      .panel-right{ padding:22px; }
    }
  </style>
</head>
<body>

  <div class="card-wrap" role="region" aria-label="Login box">
    <div class="panel-left" aria-hidden="true">
      <img src="/static/BUYROUTE.png" alt="BUYROUTE logo">
    </div>

    <div class="panel-right">
      <h2>Welcome back</h2>
      <p style="color:rgba(255,255,255,0.85); margin-bottom:12px;">Sign in to your BUYROUTE account</p>

      <!-- inline flash messages (centered inside card) -->
      {% with messages = get_flashed_messages() %}
          {% if messages %}
              {% for message in messages %}
                  <div class="flash-inline">
                      <div class="alert alert-danger" role="alert">
                          {{ message }}
                      </div>
                  </div>
              {% endfor %}
          {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('userlogin') }}" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required autofocus>
        </div>

        <div class="form-group" style="position:relative;">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" placeholder="Enter your password" required>
          <span id="togglePass" class="show-pass" aria-hidden="true">Show</span>
        </div>

        <label class="remember">
          <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;" />
          Remember me
        </label>

        <button type="submit" class="btn-primary-custom">Sign In</button>

        <div class="or-sep"><span>or</span></div>

        

        <div class="meta-row">
          <div style="font-size:0.95rem; color:rgba(255,255,255,0.88);">Don't have an account? <a href="{{ url_for('usercreate') }}">Sign up</a></div>
          <div><a href="{{url_for('userforgotpassword')}}">Forgot password?</a></div>
        </div>
      </form>
    </div>
  </div>

  <script>
    // show/hide password toggle
    const pw = document.getElementById('password');
    const toggle = document.getElementById('togglePass');
    toggle?.addEventListener('click', ()=> {
      if (pw.type === 'password'){ pw.type = 'text'; toggle.textContent = 'Hide'; }
      else { pw.type = 'password'; toggle.textContent = 'Show'; }
    });

    // small client-side highlight on invalid submit
    document.querySelector('form')?.addEventListener('submit', function(e){
      if (!this.checkValidity()){
        e.preventDefault();
        e.stopPropagation();
        [...this.elements].forEach(el=>{
          if (el.willValidate && !el.checkValidity()){
            el.style.borderBottom = '2px solid #ffcc00';
          }
        });
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
