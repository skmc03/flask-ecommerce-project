<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: url('https://cdn.wallpapersafari.com/51/58/2pVMUs.jpg') no-repeat center center/cover;
      font-family: 'Poppins', sans-serif;
    }

    .verify-box {
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: white;
    }

    .verify-box img {
      width: 80px;
      margin-bottom: 15px;
    }

    h4 {
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    }

    p {
      font-size: 14px;
      color: #f0f0f0;
      margin-bottom: 20px;
    }

    input {
      text-align: center;
      font-size: 16px;
      letter-spacing: 2px;
      background-color: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    button {
      width: 100%;
      background: linear-gradient(90deg, #ff7f50, #e63946);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #e63946, #ff4d4d);
    }
  </style>
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <h3 style="color:red">{{ message }}</h3>
    {% endfor %}
  {% endif %}
{% endwith %}
<body>
  <div class="verify-box">
    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="Verification Icon">
    <h4>Enter Registered Email</h4>
    <p>Reset link will be sent to your registered email.</p>

    <form method="post">
      <input type="text" class="form-control mb-3" name="forgot_email" placeholder="Enter Email"  required>
      <button type="submit">submit</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
