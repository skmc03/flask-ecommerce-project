<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reviews | BUYROUTE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
  body{
    min-height:100vh;
    margin:0;
    font-family:"Poppins",system-ui;
    background-image:url("https://img.freepik.com/free-photo/futuristic-metaverse-empty-room-product-display-presentation-abstract-technology-scifi-with-neon-light-3d-background_56104-2314.jpg");
    background-size:cover;
    background-repeat:no-repeat;
    background-attachment:fixed;
    padding:28px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }

  .logo{width:56px;height:56px;}

  .page-card{
    max-width:900px;
    margin:auto;
    background:rgba(255,255,255,0.94);
    border-radius:12px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }

  .review-box{
    background:white;
    padding:18px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.08);
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
  }

  .rating{
    color:#ffb300;
    font-size:1.2rem;
  }
</style>
</head>

<body>

<div class="topbar">
  <a href="{{ url_for('home') }}"><img src="/static/BUYROUTE.png" class="logo"></a>
  <h3 style="color:white;font-weight:700;">Reviews</h3>
  <div></div>
</div>

<div class="page-card">

  <h4 style="font-weight:700;">Reviews for {{ item_data[1] }}</h4>
  <hr>

  {% if not reviews %}
    <div style="padding:30px; text-align:center; font-size:1.1rem; font-weight:600;">
      No reviews yet.
      <br><br>
      <a href="{{url_for('addreview',itemid=item_data[0])}}" 
         class="btn btn-warning">Write a Review</a>
    </div>
  {% else %}

    {% for review in reviews %}
      <div class="review-box">
        
        <div class="rating">
          ⭐ {{ review[1] }}/5
        </div>

        <p style="margin-top:10px; font-size:1rem;">
          {{ review[0] }}
        </p>

        <small style="color:#555;">
          Reviewed on: {{ review[2] }}
        </small>

      </div>
    {% endfor %}

  {% endif %}

  <br>
  <a href="{{ url_for('descitem', itemid=item_data[0]) }}" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
