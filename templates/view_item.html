<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>View Item</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      background: url('https://img.freepik.com/free-photo/futuristic-metaverse-empty-room-product-display-presentation-abstract-technology-scifi-with-neon-light-3d-background_56104-2314.jpg')
        no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #fff;
    }

    .view-card {
      max-width: 850px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(rgba(255, 0, 0, 0.507), rgba(131, 186, 111, 0.507));
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .img-col {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
    }

    .img-col img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
    }

    .card-body {
      padding: 25px;
    }

    .card-body h5 {
      font-weight: 600;
    }

    .price {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffe082;
      margin-bottom: 15px;
    }

    .desc {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #f5f5f5;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 25px;
    }

    .btn {
      width: 48%;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn-outline-light:hover {
      background-color: #fff;
      color: black;
      transform: scale(1.05);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      text-shadow: 1px 1px 8px rgba(0, 0, 0, 0.7);
    }

    @media (max-width: 768px) {
      .view-card {
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="view-card">
    <div class="row g-0">
      <div class="col-md-5 img-col">
        <img src="/static/uploads/{{item_data[7]}}" alt="{{itemdata[1]}}">
      </div>
      <div class="col-md-7">
        <div class="card-body">
          <h5 class="card-title">{{itemdata[1]}}</h5>
          <p class="card-text"><strong>ID:</strong> {{itemdata[0]}}</p>
          <p class="card-text"><strong>Category:</strong> {{itemdata[6]}}</p>
          <p class="price">Price: ₹{{itemdata[4]}}</p>
          <p class="card-text"><strong>Quantity:</strong> {{itemdata[5]}}</p>
          <p class="desc">{{itemdata[2]}}</p>

          <div class="actions">
            <a href="#" class="btn btn-outline-light">Read Reviews</a>
            <a href="{{ url_for('viewallitems') }}" class="btn btn-outline-light">Back</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>
</html>
