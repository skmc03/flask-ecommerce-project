<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OTP Verification | BUYROUTE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --accent: #00ffff;
      --card-bg: rgba(0,0,0,0.45);
      --glass-border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: url('https://img.freepik.com/free-photo/arrangement-black-friday-shopping-carts-with-copy-space_23-2148667047.jpg')
        center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      padding: 20px;
      color: #fff;
    }

    .container-box {
      width: 100%;
      max-width: 920px;
      display: flex;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 36px rgba(0,0,0,0.6);
      background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.25));
      border: 1px solid var(--glass-border);
    }

    /* Left side with logo */
    .left {
      flex: 0 0 36%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      min-width: 220px;
      background: linear-gradient(135deg, rgba(34,193,195,0.05), rgba(253,187,45,0.03));
    }

    .left img {
      width: 220px;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.5));
    }

    /* Right side - OTP card */
    .right {
      flex: 1 1 64%;
      padding: 36px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 260px;
    }

    .otp-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 28px;
      border: 1px solid var(--glass-border);
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }

    .otp-card h3 {
      margin-bottom: 8px;
      font-weight: 700;
      color: #fff;
    }

    .otp-card p {
      color: rgba(255,255,255,0.9);
      margin-bottom: 18px;
    }

    .otp-input {
      width: 220px;
      max-width: 90%;
      margin: 0 auto 12px;
      padding: 14px 12px;
      font-size: 1.1rem;
      text-align: center;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
      text-transform: none; /* allow both lowercase & uppercase */
    }

    .otp-input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .btn-verify {
      width: 100%;
      padding: 10px 12px;
      background: linear-gradient(90deg,#ffffff,#ffe082);
      color: #111;
      border: none;
      font-weight: 700;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }

    .resend {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .resend a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .resend a:hover {
      text-decoration: underline;
      color: #00bcd4;
    }

    .flash {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      max-width: 90%;
    }

    @media (max-width: 880px) {
      .container-box {
        flex-direction: column;
        max-width: 560px;
      }

      .left {
        display: none;
      }

      .right {
        padding: 20px;
      }

      .otp-card {
        padding: 22px;
      }

      .otp-input {
        width: 180px;
      }
    }
  </style>
</head>
<body>

  <!-- Flash messages (for Flask) -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">
        {% for msg in messages %}
          <div class="alert alert-warning mb-1" role="alert">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="container-box" role="region" aria-label="OTP verification">
    <div class="left" aria-hidden="true">
      <img src="/static/BUYROUTE.png" alt="BUYROUTE logo">
    </div>

    <div class="right">
      <div class="otp-card" role="form" aria-labelledby="otpHeading">
        <h3 id="otpHeading">Enter OTP</h3>
        <p>We sent a 6-character verification code to your registered email/phone. Enter it below to continue.</p>

        <form method="post">
          <label for="otp" class="visually-hidden">One-time password</label>
          <input id="otp" name="otp" class="otp-input" type="text"
                 pattern="[A-Za-z0-9]{6}" maxlength="6"
                 autocomplete="one-time-code" placeholder="●●●●●●"
                 required autofocus title="Enter 6 characters (letters and/or numbers)">
          <button type="submit" class="btn-verify">Verify</button>
        </form>

        <div class="resend">
          <small style="color: rgba(255,255,255,0.8);">Didn't receive it?</small>
          <a href="#">Resend OTP</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Allow only alphanumeric characters (letters and numbers), limit to 6 chars
    const otpInput = document.getElementById('otp');
    otpInput?.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^A-Za-z0-9]/g, '').slice(0, 6);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
