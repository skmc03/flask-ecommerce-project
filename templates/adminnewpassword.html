<!DOCTYPE html>
<html>
<head>
    <title>Admin Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Admin Reset Password</h2>
    <div class="mb-3">
        <label>New Password</label>
        <input type="password" id="new_password" class="form-control">
    </div>
    <button onclick="updatePassword()" class="btn btn-primary">
        Update Password
    </button>
    <script>
        function updatePassword(){let password=document.getElementById("new_password").value;
            fetch(window.location.href,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({new_password:password})}).then(response=>response.json()).then(data=>{alert(data.message);
                if(data.message==="Password updated"){window.location.href="/adminlogin";}});
            }
    </script>
</body>
</html>
